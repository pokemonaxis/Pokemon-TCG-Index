<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PTCG Pro Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">PTCG <span>PRO</span></div>
        <button id="sync-btn" onclick="app.syncMeta()">🔄 Actualizar Meta</button>
    </header>

    <main id="app-container">
        <section id="sec-home" class="active">
            <h2>Mis Mazos</h2>
            <div id="deck-list" class="grid-list"></div>
            <button class="btn-primary" onclick="app.nav('sec-new-deck')">+ Nuevo Mazo</button>
            
            <h2 style="margin-top: 2rem;">Meta Actual</h2>
            <div id="meta-summary" class="meta-card-scroll"></div>
        </section>

        <section id="sec-new-deck">
            <h2>Crear Mazo</h2>
            <div class="form-group">
                <input type="text" id="deck-name" placeholder="Nombre del Mazo (ej. Mi Lugia)">
                <select id="deck-archetype"></select>
                <button class="btn-confirm" onclick="app.saveDeck()">Guardar Mazo</button>
                <button class="btn-cancel" onclick="app.nav('sec-home')">Cancelar</button>
            </div>
        </section>

        <section id="sec-deck-detail">
            <div id="deck-stats-header"></div>
            <canvas id="winrateChart"></canvas>
            <h3>Historial de Rondas</h3>
            <div id="match-history"></div>
            <div class="fab-container">
                <button class="btn-fab" onclick="app.openMatchModal()">+ Registrar Partida</button>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button onclick="app.nav('sec-home')">🏠 Mazos</button>
        <button onclick="app.nav('sec-meta')">📊 Meta</button>
        <button onclick="app.nav('sec-settings')">⚙️ Datos</button>
    </nav>

    <div id="match-modal" class="modal">
        <div class="modal-content">
            <h3>Nueva Partida</h3>
            <select id="opp-archetype"></select>
            <div class="score-selector">
                <button onclick="app.setMatchResult('W', '2-0')">2-0</button>
                <button onclick="app.setMatchResult('W', '2-1')">2-1</button>
                <button onclick="app.setMatchResult('L', '0-2')">0-2</button>
                <button onclick="app.setMatchResult('L', '1-2')">1-2</button>
            </div>
            <button class="btn-cancel" onclick="app.closeModal()">Cerrar</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
