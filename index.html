<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AxisTCG - Competitive Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">AxisTCG</div>
        <nav class="desktop-nav">
            <button onclick="app.showView('dashboard')">Dashboard</button>
            <button onclick="app.showView('decks')">Mazos</button>
            <button onclick="app.showView('add-match')">Registrar Partida</button>
            <button onclick="app.showView('history')">Historial</button>
        </nav>
    </header>

    <main id="app-content">
        <section id="dashboard" class="view active">
            <h2>Resumen Global</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Partidas</h3>
                    <p id="total-matches">0</p>
                </div>
                <div class="stat-card">
                    <h3>Win Rate</h3>
                    <p id="global-winrate">0%</p>
                </div>
            </div>
        </section>

        <section id="decks" class="view">
            <h2>Mis Mazos</h2>
            <form id="deck-form" class="card-form">
                <div class="form-group">
                    <label for="new-deck-name">Nombre del Mazo o Arquetipo</label>
                    <input type="text" id="new-deck-name" required placeholder="Ej: Charizard ex / Pidgeot">
                </div>
                <button type="submit" class="btn-primary">Añadir Mazo</button>
            </form>
            <div id="decks-list" class="list-container"></div>
        </section>

        <section id="add-match" class="view">
            <h2>Registrar Enfrentamiento</h2>
            <form id="match-form" class="card-form">
                <div class="form-group">
                    <label for="my-deck">Tu Mazo</label>
                    <select id="my-deck" required>
                        <option value="">Selecciona un mazo...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="opp-deck">Arquetipo Rival</label>
                    <input type="text" id="opp-deck" required placeholder="Ej: Chien-Pao ex">
                </div>
                <div class="form-group">
                    <label for="format">Formato</label>
                    <select id="format">
                        <option value="BO1">BO1 (Mejor de 1)</option>
                        <option value="BO3">BO3 (Mejor de 3)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Resultado (Secuencia)</label>
                    <input type="text" id="match-results" required placeholder="Ej: W, L, T o WLW" pattern="[WLTwlt]{1,3}">
                    <small>Usa W (Victoria), L (Derrota), T (Empate).</small>
                </div>
                <button type="submit" class="btn-primary">Guardar Partida</button>
            </form>
        </section>

        <section id="history" class="view">
            <h2>Historial de Partidas</h2>
            <div class="table-responsive">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Mazo</th>
                            <th>Rival</th>
                            <th>Fmt</th>
                            <th>Res</th>
                        </tr>
                    </thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button onclick="app.showView('dashboard')">Resumen</button>
        <button onclick="app.showView('decks')">Mazos</button>
        <button onclick="app.showView('add-match')">Part
